; platformio_override.ini
; Drop this file into the ROOT of your WLED clone (next to platformio.ini).
; PlatformIO merges it automatically.
;
; Target board: ESP32-C3 (generic dev / SuperMini)

[platformio]
default_envs = esp32c3_f1lamp

[env:esp32c3_f1lamp]
; Use the official WLED ESP32-C3 base environment
extends         = env:esp32c3dev

; Load the F1 Lamp usermod from wled/usermods/F1LampUsermod/
custom_usermods = F1LampUsermod

; Serial monitor baud rate
monitor_speed   = 115200