; F1 Lamp – standalone firmware (FastLED + ESPAsyncWebServer, no WLED)
[platformio]
default_envs = esp32c3_f1lamp

[env:esp32c3_f1lamp]
platform         = espressif32
board            = esp32-c3-devkitm-1
framework        = arduino
monitor_speed    = 115200
upload_speed     = 921600
board_build.filesystem = littlefs

; LED_PIN  : GPIO connected to WS2812B data line  (default 8 for ESP32-C3)
; MAX_LEDS : compile-time array limit; actual count set at runtime via web UI
build_flags =
    -DLED_PIN=2
    -DMAX_LEDS=300
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    fastled/FastLED
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    bblanchon/ArduinoJson @ ^7.3.0